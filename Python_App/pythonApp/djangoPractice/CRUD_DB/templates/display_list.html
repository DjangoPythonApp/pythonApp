<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5 CSS -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >

    <title>Display List</title>
</head>
<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow p-4">

            <h2 class="text-center mb-4">Student List</h2>

            <table class="table table-bordered table-hover text-center">
                
                <thead class="table-dark">
                    <tr>
                        <th>Name</th>
                        <th>Age</th>
                        <th>Edit</th>
                        <th>Delete</th>
                    </tr>
                </thead>

                <tbody>

                    {% for dat in data %}
                    <tr>
                        <td>{{ dat.name }}</td>
                        <td>{{ dat.age }}</td>

                        <td>
                            <a href="{% url 'edit_page' dat.id %}" class="btn btn-warning btn-sm">
                                Edit
                            </a>
                        </td>

                        <td>
                            <a href="{% url 'delete_page_ano' dat.id %}" class="btn btn-danger btn-sm">
                                Delete
                            </a>
                        </td>
                    </tr>
                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</body>
</html>
