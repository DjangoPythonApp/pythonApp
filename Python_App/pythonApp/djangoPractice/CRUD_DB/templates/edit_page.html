<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5 CSS -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >

    <title>Update</title>
</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="row justify-content-center">

            <div class="col-md-6">

                <div class="card shadow p-4">

                    <h2 class="text-center mb-4">
                        Update Data
                    </h2>

                   

                    <form method="POST">

                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label">
                                Name
                            </label>

                            <input 
                                type="text" 
                                name="name" 
                                value="{{ data.name }}"
                                class="form-control"
                                placeholder="Enter your name"
                            >
                        </div>

                        <div class="mb-3">
                            <label class="form-label">
                                Age
                            </label>

                            <input 
                                type="text" 
                                name="age" 
                                value="{{ data.age }}"
                                class="form-control"
                                placeholder="Enter your age"
                            >
                        </div>

                        <div class="d-grid">
                            <input 
                                type="submit" 
                                value="Update"
                                class="btn btn-primary"
                            >
                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</body>
</html>
