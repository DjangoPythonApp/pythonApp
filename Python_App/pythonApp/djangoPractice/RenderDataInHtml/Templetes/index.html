<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div style="width:320px; margin:120px auto; padding:24px; background:#4A90E2; color:#ffffff; text-align:center; border-radius:16px; box-shadow:0 10px 20px rgba(0,0,0,0.15);">
        <h1 style="margin:0 0 12px; font-size:28px;">{{ name }}</h1>
        <h2 style="margin:0; font-size:18px;">{{ age }} years old</h2>
        <p style="margin:0; font-size:16px;">Hobbies: {{ hobbies|join:", " }}</p>
    </div>
</body>
</html>
