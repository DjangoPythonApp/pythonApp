<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Person CRUD</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light">

<div class="container py-5">

    <!-- Header -->
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="text-primary">Person CRUD Application</h1>

        <a href="{% url 'person_create' %}" class="btn btn-success">
            + Add Person
        </a>
    </div>

    <!-- Table Card -->
    <div class="card shadow border-0">
        <div class="card-body">

            <div class="table-responsive">

                <table class="table table-hover table-bordered align-middle">

                    <thead class="table-dark">
                        <tr>
                            <th>Image</th>
                            <th>Name</th>
                            <th>Age</th>
                            <th>Address</th>
                            <th>Course</th>
                            <th width="180">Actions</th>
                        </tr>
                    </thead>

                    <tbody>

                        {% for person in persons %}
                        <tr>

                            <td>
                                {% if person.image %}
                                    <img src="{{ person.image.url }}"
                                         alt="{{ person.name }}"
                                         class="img-thumbnail"
                                         width="80">
                                {% else %}
                                    <span class="text-muted">No Image</span>
                                {% endif %}
                            </td>

                            <td>{{ person.name }}</td>
                            <td>{{ person.age }}</td>
                            <td>{{ person.address }}</td>
                            <td>{{ person.course_enrolled }}</td>

                            <td>
                                <a href="{% url 'person_update' person.id %}"
                                   class="btn btn-warning btn-sm">
                                    Edit
                                </a>

                                <a href="{% url 'person_delete' person.id %}"
                                   class="btn btn-danger btn-sm"
                                   onclick="return confirm('Delete record?')">
                                    Delete
                                </a>
                            </td>

                        </tr>
                        {% empty %}
                        <tr>
                            <td colspan="6" class="text-center text-muted">
                                No records found.
                            </td>
                        </tr>
                        {% endfor %}

                    </tbody>

                </table>

            </div>

        </div>
    </div>

</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
