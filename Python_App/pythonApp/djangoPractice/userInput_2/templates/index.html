<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Input</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>

</head>
<body>
    <h1>User Input</h1>
    <div>
        <form method="POST">
            {% csrf_token %}
            <label for='name'>Enter your name:</label>
            <input type='text' name='name' placeholder='Enter your name'><br>
            <label for='age'>Enter your age:</label>
            <input type='text' name='age' placeholder='Enter your age'><br>
             <label for='email'>Enter your email:</label>
            <input type='text' name='email' placeholder='Enter your email'><br>
            <input type='submit'>

        </form>
    </div>

    {% if item_list %}

        <table>
            <thead>
                <tr>
                    <th>Id</th>
                    <th>Name</th>
                    <th>Age</th>
                    <th>email</th>
                <tr>
                </thead>
                <tbody>
                    {% for item in item_list %}
                    <tr>
                        <td>{{ item.0 }}</td>
                        <td>{{ item.1 }}</td>
                        <td>{{ item.2 }}</td>
                        <td>{{ item.3 }}</td>
                         <td><a href="{% url 'edit' item.0 %}"><i class="fa-regular fa-pen-to-square" style="color: rgb(23, 21, 21);"></i><a></td>
                          <td><a href="{% url 'delete' item.0 %}"><i class="fa-regular fa-trash-can" style="color: rgb(215, 26, 26);"></i></td>

                    </tr>
                    {% endfor %}
                </tbody>
            </table>

            <br>

    {% endif %}

    {% if message %}
    <h4> {{ message }}</h4>
    {% endif %}

</body>
</html>
