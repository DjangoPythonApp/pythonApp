<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Django</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body style="background: linear-gradient(to right, #dbeafe, #f0f9ff);">

    <div class="container d-flex justify-content-center align-items-center vh-100">

        <div class="card shadow-lg p-4 border-0" style="width: 420px; border-radius: 20px; background-color: white;">
            <h2 class="text-center mb-4 fw-bold text-primary">Numerical Operations</h2>

            <form action="" method="POST">
                {% csrf_token %}

                <div class="form-group mt-1">
                    <label for="name">NUMBER</label>
                    <br>
                    <input type="text" class="form-control rounded-pill p-2" 
                    name="fname" placeholder="Enter value">

                    <small class="text-danger">
                      {{ fname_error }}
                    </small>
                </div>
                <br>
                <!-- BUTTONS -->
                <div class="row mt-4 g-2">
                    <!-- PRIME -->
                    <div class="col-6">
                        <button type="submit "name="action" value="prime" class="btn btn-primary w-100 rounded-pill">
                            Prime
                        </button>
                    </div>
                    <br>
                    <!-- PALINDROME -->
                    <div class="col-6">
                        <button type="submit "name="action" value="palindrome" class="btn btn-primary w-100 rounded-pill">
                            Palindrome
                        </button>
                    </div>
                    <br>
                    <!-- REVERSE -->
                    <div class="col-6">
                        <button type="submit "name="action" value="reverse" class="btn btn-primary w-100 rounded-pill">
                            Reverse
                        </button>
                    </div>
                    <br>
                    <!-- FIBONACCI -->
                    <div class="col-6">
                        <button type="submit "name="action" value="fibonacci" class="btn btn-primary w-100 rounded-pill">
                            Fibonacci
                        </button>
                    </div>
                    <br>
                    <!-- LEAP YEAR -->
                    <div class="col-6">
                        <button type="submit "name="action" value="leapyear" class="btn btn-primary w-100 rounded-pill">
                            Leap Year
                        </button>
                    </div>
                    <br>
                    <!-- SWAP NO -->
                    <div class="col-6">
                        <button type="submit "name="action" value="swapno" class="btn btn-primary w-100 rounded-pill">
                            Swap No
                        </button>
                    </div>
                </div>
            </form>
            <h4 class="text-center mt-4 text-success fw-semibold">
                {{ message }}
            </h4>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
