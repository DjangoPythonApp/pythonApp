<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Website</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'header.css' %}">
</head>
<body>

<header class="header">
    <div class="logo">MySite</div>
    <nav>
        <ul>
            {% url 'index' as index_url %}
            {% url 'about' as about_url %}
            {% url 'form' as form_url %}
            <li><a class="{% if request.path == index_url %} active {% endif %}" href="{% url 'index' %}">Home</a></li>
            <li><a class="{% if request.path == about_url %} active {% endif %}" href="{% url 'about' %}">About</a></li>
            <li><a class="{% if request.path == form_url %} active {% endif %}" href="{% url 'form' %}">Form</a></li>
        </ul>
    </nav>
</header>
