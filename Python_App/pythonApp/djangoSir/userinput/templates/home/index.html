<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Django</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css"/>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center fs-3">Python List in Django</div>
        <form action="" method="POST">
            {% csrf_token %}
            <div class="form-group mt-1">
                <label for="name">First name</label>
                <input type="text" class="form-control" name="fname" placeholder="Enter your first name">
            </div><br>
            <div class="form-group mt-1">
                <label for="name">Last name</label>
                <input type="text" class="form-control" name="lname" placeholder="Enter your last name">
            </div><br>
            <div class="form-group mt-1">
                <label for="name">Age</label>
                <input type="text" class="form-control" name="age" placeholder="Enter your age">
            </div>
            <div class="row justify-content-center">
                <div class="col-auto">
                    <button type="submit" class="btn btn-primary mt-2">  Save  </button>
                </div>
              </div>
        </form>
    
    <!-- Display the response message if available -->
        <!-- {% if message %}
            <p>{{ message }}</p>
        {% endif %} -->


        {% if items %}
        <table class="table table-dark table-striped mt-2">
            <thead>
              <tr>
                <th>ID</th>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Age</th>
                <th>Edit</th>
                <th>Delete</th>
              </tr>
            </thead>
            <tbody>
                {% for item in items %}
                <tr>
                    <td>{{ item.0 }}</td>
                    <td>{{ item.1 }}</td>
                    <td>{{ item.2 }}</td>
                    <td>{{ item.3 }}</td>
                    <td>
                        <a href="{% url 'edit' item.0 %}"><i class="fa-regular fa-pen-to-square" style="color: rgb(255, 255, 255);"></i></a>
                    </td>
                    <td>
                        <a href="{% url 'delete' item.0 %}"><i class="fa-regular fa-trash-can" style="color: rgb(215, 26, 26);"></i></a>
                    </td>
                </tr>
                    <!-- <div>Age: {{ item.0 }} First name: {{ item.1 }} Last name: {{ item.2 }}</div> -->
                {% endfor %}
        {% endif %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
