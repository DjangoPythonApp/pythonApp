<form method="POST">
    {% csrf_token %}

    <p>
        <label>Name</label>
        {{ form.name }}
        {{ form.name.errors }}
    </p>

    <p>
        <label>Price</label>
        {{ form.price }}
        {{ form.price.errors }}
    </p>

    <p>
        <label>Description</label>
        {{ form.description }}
        {{ form.description.errors }}
    </p>

    <button type="submit" class="btn btn-primary">
        Save
    </button>
</form>
