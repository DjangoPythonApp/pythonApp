{% extends 'base.html' %}

{% block content %}
<h2>Product List</h2>

<ul>
    {% for product in products %}
        <li>
            {{ product.name }} - {{ product.price }}
            <a href="{% url 'product_update' product.id %}">Edit</a>
            <a href="{% url 'product_delete' product.id %}">Delete</a>
        </li>
    {% endfor %}
</ul>
{% endblock %}
