<!-- templates/index/index.html -->

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Masking App</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>

        body{
            background-color:#f4f4f4;
        }

        .main-container{
            width:450px;
            margin:auto;
            margin-top:100px;
            background-color:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0px 0px 10px rgba(0,0,0,0.2);
        }

        .heading{
            text-align:center;
            margin-bottom:25px;
            font-weight:bold;
        }

        .result-box{
            margin-top:20px;
        }

    </style>
</head>
<body>

    <div class="main-container">

        <h2 class="heading">Email Masking App</h2>

        <form method="POST">

            {% csrf_token %}

            <div class="mb-3">

                <label class="form-label">
                    Enter Your Email
                </label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="Enter email"
                >

            </div>

            <div class="d-grid">

                <button type="submit" class="btn btn-primary">
                    Mask Email
                </button>

            </div>

        </form>

        {% if masked_email %}

            <div class="alert alert-success result-box">

                <strong>Masked Email :</strong>
                {{ masked_email }}

            </div>

        {% endif %}

        {% if error %}

            <div class="alert alert-danger result-box">

                {{ error }}

            </div>

        {% endif %}

    </div>

</body>
</html>
