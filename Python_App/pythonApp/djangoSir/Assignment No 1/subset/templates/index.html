<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap CSS -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >

    <title>Fuzzy Subset</title>
</head>

<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow p-4">

            <h1 class="text-center mb-4">
                Fuzzy Subset Checker
            </h1>

            <!-- First Form -->

            <form method="POST">

                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">
                        Enter the number of elements for Set A
                    </label>

                    <input 
                        type="number"
                        name="num"
                        class="form-control"
                        placeholder="Enter number..."
                    >

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Enter the number of elements for Set B
                    </label>

                    <input 
                        type="number"
                        name="num2"
                        class="form-control"
                        placeholder="Enter number..."
                    >

                </div>

                <button class="btn btn-primary">
                    Create Inputs
                </button>

            </form>


            <!-- Second Form -->

            {% if n and n2 %}

            <hr>

            <form method="POST">

                {% csrf_token %}

                <input type="hidden" name="num" value="{{ n }}">
                <input type="hidden" name="num2" value="{{ n2 }}">

                <!-- Set A -->

                <h4 class="mt-3 mb-3">
                    Enter Set A Values
                </h4>

                {% for i in ""|center:n %}

                <div class="row mb-3">

                    <div class="col-md-6">

                        <input 
                            type="text"
                            name="ae{{ forloop.counter0 }}"
                            class="form-control"
                            placeholder="Element A{{ forloop.counter }}"
                        >

                    </div>

                    <div class="col-md-6">

                        <input 
                            type="text"
                            name="am{{ forloop.counter0 }}"
                            class="form-control"
                            placeholder="Membership A{{ forloop.counter }}"
                        >

                    </div>

                </div>

                {% endfor %}


                <!-- Set B -->

                <h4 class="mt-4 mb-3">
                    Enter Set B Values
                </h4>

                {% for i in ""|center:n2 %}

                <div class="row mb-3">

                    <div class="col-md-6">

                        <input 
                            type="text"
                            name="be{{ forloop.counter0 }}"
                            class="form-control"
                            placeholder="Element B{{ forloop.counter }}"
                        >

                    </div>

                    <div class="col-md-6">

                        <input 
                            type="text"
                            name="bm{{ forloop.counter0 }}"
                            class="form-control"
                            placeholder="Membership B{{ forloop.counter }}"
                        >

                    </div>

                </div>

                {% endfor %}

                <button class="btn btn-success">
                    Check Subset
                </button>

            </form>

            {% endif %}


            <!-- Result -->

            {% if message %}

            <div class="alert alert-info mt-4">

                {{ message }}

            </div>

            {% endif %}

        </div>

    </div>

</body>
</html>
