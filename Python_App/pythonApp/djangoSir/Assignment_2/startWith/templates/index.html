<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>startswith()</title>
</head>
<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow p-4">
            
            <h1 class="text-center text-primary mb-4">startswith()</h1>

            <form method="POST">
                {% csrf_token %}

                <!-- String Input -->
                <div class="mb-3">
                    <label class="form-label">Enter the string:</label>
                    <input 
                        type="text" 
                        name="name" 
                        class="form-control"
                        placeholder="Enter the string.."
                    >

                    {% if error %}
                    <div class="text-danger mt-2">
                        {{ error }}
                    </div>
                    {% endif %}
                </div>

                <!-- Sub-string Input -->
                <div class="mb-3">
                    <label class="form-label">Enter the sub-string:</label>
                    <input 
                        type="text" 
                        name="name2" 
                        class="form-control"
                        placeholder="Enter the sub-string.."
                    >

                    {% if error2 %}
                    <div class="text-danger mt-2">
                        {{ error2 }}
                    </div>
                    {% endif %}
                </div>

                <!-- Submit Button -->
                <div class="d-grid">
                    <input type="submit" class="btn btn-primary" value="Check">
                </div>

            </form>

            <!-- Message Section -->
            {% if message %}
            <div class="alert alert-success mt-4 text-center">
                {{ message }}
            </div>
            {% endif %}

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
