<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Substring Finder</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h2 class="text-center mb-4">Substring Finder Using find()</h2>

    <form method="POST">

        {% csrf_token %}

        <div class="mb-3">
            <label>Main String</label>
            <input type="text" name="name" class="form-control" placeholder="Enter main string">
        </div>

        <div class="mb-3">
            <label>Substring</label>
            <input type="text" name="find1" class="form-control" placeholder="Enter substring">
        </div>

        <button type="submit" class="btn btn-primary">
            Find
        </button>

    </form>

    <div class="mt-4">

        {% if message %}

            <h4>{{ message }}</h4>

            <p>
                Main String:
                <strong>{{ main_string }}</strong>
            </p>

            <p>
                Substring:
                <strong>{{ sub_string }}</strong>
            </p>

            <p>
                Position:
                <strong>{{ position }}</strong>
            </p>

        {% endif %}

    </div>

</div>

</body>
</html>
