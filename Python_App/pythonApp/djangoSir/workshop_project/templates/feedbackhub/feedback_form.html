<!DOCTYPE html>
<html>
<head>
    <title>Feedback Form</title>
    {% load static %}
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="{% static 'feedbackhub/feedback.js' %}"></script>
</head>
<body>

<div class="container mt-4">
    <h1>Workshop Feedback Form</h1>
    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}

        <button type="button" onclick="checkReview()"
                class="btn btn-warning">
            Analyze Review
        </button>

        <button type="submit"
                class="btn btn-primary">
            Submit Feedback
        </button>

    </form>

    <hr>

    <div id="result"></div>

    <p>
        Request Ref: {{ request_id }}
    </p>

</div>

</body>
</html>
