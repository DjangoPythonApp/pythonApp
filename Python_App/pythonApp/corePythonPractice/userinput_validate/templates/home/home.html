<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Django</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">

    <div class="container d-flex justify-content-center align-items-center vh-100">

        <div class="card shadow p-4" style="width: 400px; border-radius: 15px;">

            <h2 class="text-center mb-4">User Form</h2>

            <form action="" method="POST">
                {% csrf_token %}

                <div class="form-group mt-1">
                    <label for="name">First name</label>
                    <input type="text" class="form-control" name="fname" placeholder="Enter your first name">

                    <small class="text-danger">
                      {{ fname_error }}
                    </small>
                </div>

                <br>

                <div class="form-group mt-1">
                    <label for="name">Last name</label>
                    <input type="text" class="form-control" name="lname" placeholder="Enter your last name">

                    <small class="text-danger">
                      {{ lname_error }}
                    </small>
                </div><br>

                <div class="row justify-content-center">
                    <div class="col-auto">
                        <button type="submit" class="btn btn-primary mt-4">
                            Submit
                        </button>
                    </div>
                </div>

            </form>

            <h4 class="text-center mt-4">
                {{ message }}
            </h4>

        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
