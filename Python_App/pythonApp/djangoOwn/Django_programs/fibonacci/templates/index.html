<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Fibonacci Series</title>
</head>
<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow-lg p-4">
            
            <h1 class="text-center text-primary mb-4">
                Fibonacci Series
            </h1>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label for="fibo" class="form-label">
                        Enter the Nth Term:
                    </label>

                    <input 
                        type="text"
                        name="data"
                        class="form-control"
                        placeholder="Enter the Nth Term"
                    >
                </div>

                <!-- Message Section -->
                {% if message %}
                <div class="alert alert-info">
                    {{ message }}
                </div>
                {% endif %}

                <div class="d-grid">
                    <input 
                        type="submit"
                        value="Generate"
                        class="btn btn-primary"
                    >
                </div>
            </form>

            <!-- Fibonacci Output -->
            {% if fibo_list %}
            <div class="mt-4">

                <h4 class="text-success mb-3">
                    Fibonacci Series Output
                </h4>

                <div class="border rounded p-3 bg-light">
                    {% for i in fibo_list %}
                        <span class="badge bg-dark m-1 p-2">
                            {{ i }}
                        </span>
                    {% endfor %}
                </div>

            </div>
            {% endif %}

        </div>

    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
