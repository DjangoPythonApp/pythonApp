<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Bootstrap 5 CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Vowels & Consonents</title>
</head>
<body class="bg-light">

    <div class="container mt-5">

        <div class="card shadow p-4">

            <h1 class="text-center mb-4 text-primary">
                Vowels & Consonents
            </h1>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">
                        Enter the String
                    </label>

                    <input 
                        type="text"
                        name="data"
                        class="form-control"
                        placeholder="Enter your string.."
                    >
                </div>

                <div class="d-grid">
                    <input 
                        type="submit"
                        value="Check"
                        class="btn btn-primary"
                    >
                </div>
            </form>
            {% if data %}
            <input 
              type="text"
              value="{{ data }}"
              class="form-control"
              readonly>

              {% endif %}

            <div class="mt-4">

                {% if v1 %}
                <div class="alert alert-success">
                    <h5> {{ v1 }}</h5>
                </div>
                {% endif %}

                {% if c1 %}
                <div class="alert alert-info">
                    <h5> {{ c1 }}</h5>
                </div>
                {% endif %}

            </div>

        </div>

    </div>

</body>
</html>
