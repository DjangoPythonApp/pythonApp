{% extends 'base.html' %}

{% block content %}
    <h1>Delete Product:{{ product.name }}</h1>
    <p>Are you sure you want to delete this product?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, Delete</button>
        <a href="{% url 'product_list' %}">Cancel</a>
    </form>
{% endblock %}
