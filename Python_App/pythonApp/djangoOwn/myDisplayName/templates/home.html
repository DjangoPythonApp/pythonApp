<!DOCTYPE html>
<html lang="en">
<head>
    
    <title>Welcome App</title>

    <!-- Bootstrap CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <!-- Card -->
            <div class="card shadow">
                <div class="card-body">

                    <h3 class="text-center mb-4">Enter Your Name</h3>

                   <form method="POST">
    {% csrf_token %}

    <!-- First Name -->
    <div class="mb-3">
        <label class="form-label">First Name</label>
        <input type="text" name="first_name"
               class="form-control {% if first_error %}is-invalid{% endif %}"
               value="{{ request.POST.first_name }}">

        {% if first_error %}
            <div class="text-danger mt-1">
                {{ first_error }}
            </div>
        {% endif %}
    </div>

    <!-- Last Name -->
    <div class="mb-3">
        <label class="form-label">Last Name</label>
        <input type="text" name="last_name"
               class="form-control {% if last_error %}is-invalid{% endif %}"
               value="{{ request.POST.last_name }}">

        {% if last_error %}
            <div class="text-danger mt-1">
                {{ last_error }}
            </div>
        {% endif %}
    </div>

    <div class="d-grid">
        <button type="submit" class="btn btn-primary">Submit</button>
    </div>
</form>

<!-- Success -->
{% if name %}
    <div class="alert alert-success mt-4 text-center">
        Welcome, <strong>{{ name }}</strong>, to the world of Python 🚀
    </div>
{% endif %}

                </div>
            </div>

        </div>
    </div>
</div>

</body>
</html>
