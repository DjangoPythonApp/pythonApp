<html>
    <head>
        <title>
            Index page
        </title>
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <main>
        <body>
           <div class="container mt-5 p-5 bg-light border border-primary rounded">
            <form method="POST">
                {% csrf_token %}
   <div class="mb-3">
             
  <label for="fname" class="form-label">First name:</label><br>
  <input type="text" id="fname" name="fname" class="form-control" placeholder="Enter your first name"><br>

  {% if error %}
  <p class="form-label">{{error}}</p>
  {% endif %}

  </div>


  <label for="lname" class="form-label">Last name:</label><br>
  <input type="text" id="lname" name="lname" class="form-control" placeholder="Enter your last name"><br><br>

  {% if error %}
  <p class="form-label">{{error}}</p>
  {% endif %}

  <input type="submit" value="Submit" class="btn btn-primary">
</form> 

{% if fname or lname %}
<h3 class="form-label">Your name is {{fname}} {{lname}}</h3>

{% endif %}
        </body>
        </div>
    </main>
</html>
